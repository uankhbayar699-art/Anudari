<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Анударьдаа 💖</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
color:white;
overflow-x:hidden;
background:linear-gradient(180deg,#1a1a2e,#16213e,#0f3460,#090a0f);
min-height:200vh;
}

/* stars */

.star{
position:fixed;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
0%{opacity:0.2}
100%{opacity:1}
}

/* roses */

.rose{
position:fixed;
top:-20px;
font-size:24px;
animation:roseFall 8s linear infinite;
}

@keyframes roseFall{
0%{transform:translateY(-10px) rotate(0)}
100%{transform:translateY(110vh) rotate(360deg)}
}

/* heart rain */

.rainHeart{
position:fixed;
top:-20px;
font-size:24px;
animation:rainFall 4s linear forwards;
pointer-events:none;
}

@keyframes rainFall{
0%{transform:translateY(-20px);opacity:1}
100%{transform:translateY(110vh);opacity:0}
}

/* floating hearts */

.heart{
position:fixed;
bottom:-20px;
font-size:26px;
animation:float 7s linear infinite;
}

@keyframes float{
0%{transform:translateY(0)}
100%{transform:translateY(-1100px)}
}

/* fireworks */

.firework{
position:fixed;
font-size:28px;
animation:boom 1s ease-out forwards;
}

@keyframes boom{
0%{opacity:1;transform:scale(0)}
100%{opacity:0;transform:scale(3)}
}

/* text */

h1{
margin-top:90px;
color:#ff9fc6;
font-size:42px;
text-shadow:0 0 20px #ff6fa5;
}

p{
font-size:20px;
line-height:1.6;
}

button{
padding:14px 35px;
font-size:18px;
border:none;
border-radius:30px;
background:#ff2e63;
color:white;
cursor:pointer;
margin:10px;
transition:0.3s;
box-shadow:0 0 15px #ff2e63;
}

button:hover{
transform:scale(1.1);
box-shadow:0 0 35px #ff2e63;
}

#surprise{
display:none;
font-size:22px;
color:#ffd1dc;
max-width:600px;
margin:30px auto;
background:rgba(255,255,255,0.08);
padding:20px;
border-radius:20px;
backdrop-filter:blur(10px);
}

#answer{
margin-top:20px;
font-size:24px;
color:#ffd1dc;
}

/* mobile */

@media (max-width:600px){

h1{
font-size:28px;
margin-top:60px;
}

p{
font-size:18px;
padding:0 20px;
}

button{
font-size:16px;
padding:12px 24px;
}

}

</style>
</head>

<body>

<h1>Сайхан амарсан уу гүнжээ 😙❣️💖</h1>

<p>
 Хайртайшүү ❤️<br>
 Өнөөдөр чиний өдөр шүү ✨
 Хэний охин билэ алаад өгөөрэй😚😝
</p>

<button onclick="start()">Click Me 💌</button>

<div id="surprise">
Миний охин үнхээр мундаг байгаа шүүү 😘<br><br>
Чамтай чатлах болгонд миний mood шууд сайхан болдог❤️<br>
Чи яг л жижигхэн нар шиг, миний өдрийг гэрэлтүүлдэг жүү ☀️
</div>

<h2 style="margin-top:40px;">Үнсийдааа гүнжээ 👑</h2>

<button onclick="yes()">Yes 💖</button>
<button id="noBtn" onclick="move()" onmouseover="move()">No 😅</button>

<div id="answer"></div>

<script>

/* stars */

for(let i=0;i<200;i++){
let s=document.createElement("div")
s.className="star"
s.style.top=Math.random()*100+"%"
s.style.left=Math.random()*100+"%"
document.body.appendChild(s)
}

/* roses */

for(let i=0;i<20;i++){
let r=document.createElement("div")
r.className="rose"
r.innerHTML="🌹"
r.style.left=Math.random()*100+"%"
document.body.appendChild(r)
}

/* floating hearts */

for(let i=0;i<25;i++){
let h=document.createElement("div")
h.className="heart"
h.innerHTML="❤️"
h.style.left=Math.random()*100+"%"
document.body.appendChild(h)
}

/* click me */

function start(){
document.getElementById("surprise").style.display="block"
}

/* yes */

function yes(){

document.getElementById("answer").innerHTML=
"Угаассаа өөр сонголт байхгүй ээ 😉😚 ❤️"

heartRain()
fireworks()

}

/* heart rain */

function heartRain(){

for(let i=0;i<120;i++){

let h=document.createElement("div")
h.className="rainHeart"
h.innerHTML="💗"

h.style.left=Math.random()*100+"%"
h.style.animationDuration=(3+Math.random()*2)+"s"

document.body.appendChild(h)

setTimeout(()=>h.remove(),4000)

}

}

/* fireworks */

function fireworks(){

for(let i=0;i<25;i++){

let f=document.createElement("div")
f.className="firework"
f.innerHTML="✨"

f.style.left=Math.random()*100+"%"
f.style.top=Math.random()*100+"%"

document.body.appendChild(f)

setTimeout(()=>f.remove(),1000)

}

}

/* no button */

function move(){

let btn=document.getElementById("noBtn")

let x=Math.random()*(window.innerWidth-100)
let y=Math.random()*(window.innerHeight-50)

btn.style.position="absolute"
btn.style.left=x+"px"
btn.style.top=y+"px"

}

</script>

</body>
</html>
